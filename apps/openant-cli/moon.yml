$schema: "https://moonrepo.dev/schemas/project.json"

id: "openant-cli"
type: "application"
language: "go"
tags: ["cli", "go"]

tasks:
  build:
    command: "go build -o bin/openant ./main.go"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "bin/openant"

  test:
    command: "go test ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  lint:
    command: "go vet ./..."
    inputs:
      - "**/*.go"

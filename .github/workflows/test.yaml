name: tests
on:
  push:
    branches: [master]
  pull_request:

env:
  # setup-python@v5 and setup-go@v5 don't have Node.js 24 releases yet
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Exclude workspace + toolchain caches from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $paths = @(
            $env:GITHUB_WORKSPACE,
            "$env:LOCALAPPDATA\go-build",
            "$env:USERPROFILE\go\pkg\mod",
            "$env:LOCALAPPDATA\npm-cache",
            "$env:APPDATA\npm-cache"
          )
          foreach ($p in $paths) {
            Add-MpPreference -ExclusionPath $p -ErrorAction SilentlyContinue
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: libs/openant-core/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: libs/openant-core/parsers/javascript/package-lock.json

      - name: Install Python dependencies
        working-directory: libs/openant-core
        run: pip install -e ".[dev]"

      - name: Lint Python (undefined names, syntax errors)
        working-directory: libs/openant-core
        run: ruff check .

      - name: Cache JS parser node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: libs/openant-core/parsers/javascript/node_modules
          key: ${{ runner.os }}-jsparser-nodemodules-${{ hashFiles('libs/openant-core/parsers/javascript/package-lock.json') }}

      - name: Install JS parser dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: libs/openant-core/parsers/javascript
        run: npm ci

      - name: Run Python and parser tests
        working-directory: libs/openant-core
        run: python -m pytest tests/test_token_tracker.py tests/test_parser_adapter.py tests/test_python_parser.py tests/test_js_parser.py tests/test_resume_stage1.py tests/test_declared_dependencies.py -v

  go-tests:
    name: Go build + integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Exclude workspace + toolchain caches from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $paths = @(
            $env:GITHUB_WORKSPACE,
            "$env:LOCALAPPDATA\go-build",
            "$env:USERPROFILE\go\pkg\mod",
            "$env:LOCALAPPDATA\npm-cache",
            "$env:APPDATA\npm-cache"
          )
          foreach ($p in $paths) {
            Add-MpPreference -ExclusionPath $p -ErrorAction SilentlyContinue
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/openant-cli/go.mod
          cache-dependency-path: apps/openant-cli/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: libs/openant-core/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: libs/openant-core/parsers/javascript/package-lock.json

      - name: Vet
        working-directory: apps/openant-cli
        run: go vet ./...

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: apps/openant-cli
        run: go build -o openant .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/openant-cli
        run: go build -o openant.exe .

      - name: Verify binary exists
        working-directory: apps/openant-cli
        shell: bash
        run: |
          if [ -f openant ] || [ -f openant.exe ]; then
            echo "Binary built successfully"
          else
            echo "ERROR: Binary not found" && exit 1
          fi

      - name: Install Python dependencies
        working-directory: libs/openant-core
        run: pip install -e ".[dev]"

      - name: Cache JS parser node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: libs/openant-core/parsers/javascript/node_modules
          key: ${{ runner.os }}-jsparser-nodemodules-${{ hashFiles('libs/openant-core/parsers/javascript/package-lock.json') }}

      - name: Install JS parser dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: libs/openant-core/parsers/javascript
        run: npm ci

      - name: Run Go CLI integration tests
        working-directory: libs/openant-core
        run: python -m pytest tests/test_go_cli.py -v --tb=short
